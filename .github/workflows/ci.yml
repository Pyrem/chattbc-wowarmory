name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend-lint:
    name: "Backend: Ruff"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  backend-typecheck:
    name: "Backend: mypy"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy --strict app/

  backend-test:
    name: "Backend: pytest"
    runs-on: ubuntu-latest
    needs: backend-typecheck
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  # ── Frontend ─────────────────────────────────────────────
  frontend-lint:
    name: "Frontend: ESLint + Prettier"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - run: npx prettier --check .

  frontend-build:
    name: "Frontend: Build"
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Static Analysis ───────────────────────────────────────
  scan:
    name: "Static Analysis: ast-grep + Semgrep"
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Run ast-grep
        uses: ast-grep/action@v0
        with:
          args: scan
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep/

  # ── Gate ─────────────────────────────────────────────────
  ci-pass:
    name: "CI Pass"
    runs-on: ubuntu-latest
    if: always()
    needs: [backend-test, frontend-build, scan]
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.backend-test.result }}" != "success" ]]; then
            echo "backend-test failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-build.result }}" != "success" ]]; then
            echo "frontend-build failed"
            exit 1
          fi
          if [[ "${{ needs.scan.result }}" != "success" ]]; then
            echo "scan failed"
            exit 1
          fi
          echo "All checks passed"
